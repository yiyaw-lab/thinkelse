name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Lint surfaces issues but does not block CI: the repo has pre-existing
      # lint errors. Drop continue-on-error once they are resolved to make
      # lint a hard gate.
      - name: Lint
        run: npm run lint
        continue-on-error: true
