name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Elsy quality rubric
        run: npm run check:quality-rubric

      - name: Check Elsy quality fixtures
        run: npm run check:quality-fixtures

      - name: Check family memory profile
        run: npm run check:family-memory

      - name: Check learning arcs
        run: npm run check:learning-arcs

      - name: Check dinner playbook
        run: npm run check:dinner-playbook

      - name: Check world-context cards
        run: npm run check:world-context

      - name: Check parent companion
        run: npm run check:parent-companion

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          OPENAI_API_KEY: ci-placeholder-openai-key

      # Lint surfaces issues but does not block CI: the repo has pre-existing
      # lint errors. Drop continue-on-error once they are resolved to make
      # lint a hard gate.
      - name: Lint
        run: npm run lint
        continue-on-error: true
